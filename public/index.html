<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>短视频运营数据看板</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
    }
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px 24px;
      text-align: center;
    }
    .card {
      max-width: 760px;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 32px;
      padding: 64px 48px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: clamp(40px, 7vw, 80px);
      line-height: 1.05;
      letter-spacing: -0.06em;
      margin: 0 0 20px;
    }
    p {
      font-size: 20px;
      line-height: 1.6;
      color: #6e6e73;
      margin: 0;
    }
    .status {
      margin-top: 32px;
      font-size: 14px;
      color: #86868b;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>短视频运营数据看板</h1>
      <p>抖音 × 快手账号与视频表现追踪</p>
      <div class="status">项目已初始化，等待接入 Excel 数据。</div>
    </section>
  </main>
</body>
</html>
